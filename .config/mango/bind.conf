# ============================================================
# bind.conf — mango 快捷键配置
# copilot code:148
# altGr code:149
# ============================================================

# -----------------------------------------------------------
# 1. Exit / Power
# -----------------------------------------------------------

# 关闭窗口
bind=SUPER,q,killclient

# 退出 mango
bind=CTRL+ALT,DELETE,quit

# 重新加载配置
bind=SUPER,r,reload_config

# 查看快捷键列表
bind=SUPER,ESCAPE,spawn,bash ~/.config/mango/scripts/keybinds.sh

# 布局切换（toggle-tabbed, mango 无 tab 用 switch_layout）
bind=SUPER,w,switch_layout

# 切换waybar主题 ~/.config/waybar-themes
bind=SUPER+ctrl,m,spawn,foot -e bash ~/.local/bin/switch-waybar-theme.sh -l

# -----------------------------------------------------------
#  特殊按键
#  PERIOD=.
#  semicolon=;
#  apostrophe='
#  SLASH=/
#  COMMA=,
#  bracketleft=[
#  bracketright=]

# -----------------------------------------------------------
# 2. 应用管理
# -----------------------------------------------------------
# 浏览器 firefox
# bind=SUPER,b,spawn,/usr/bin/firefox
bind=SUPER,b,spawn,vicinae vicinae://launch/applications/firefox
# bind=SUPER+shift,b,spawn,vicinae vicinae://launch/@aurelleb/store.vicinae.chromium-bookmarks/search-bookmarks
# bind=ctrl,tab,spawn,vicinae vicinae://launch/browser-extension/browse-tabs
# binds=SUPER,comma,toggle_named_scratchpad,Ubuntu XFCE,chrome-127.0.0.1__-Default,chromium --app=http://127.0.0.1:3000 --start-fullscreen

# webtop-ubuntu
binds=SUPER_L+SHIFT_L,code:201,toggle_named_scratchpad,chrome-hbblfifohofgngfbjbiimbbcimepbdcb-Default,none,vicinae vicinae://launch/applications/chrome-hbblfifohofgngfbjbiimbbcimepbdcb-Default
# copilot = SUPER_L+SHIIT_L,code:201（XF86Assistant）

# memos
binds=none,ISO_Level3_Shift,toggle_named_scratchpad,chrome-hhdfmjkegggpjeamndhkjpolbhkiaehb-Default,none,vicinae vicinae://launch/applications/chrome-hhdfmjkegggpjeamndhkjpolbhkiaehb-Default
# ISO_Level3_Shift (code:108)

binds=SUPER,ISO_Level3_Shift,toggle_named_scratchpad,com.follow.clash,none,/usr/bin/flclash

# 终端模拟器
bind=SUPER,Return,spawn,/usr/bin/foot
bind=SUPER,SLASH,spawn,/usr/bin/alacritty
bind=SUPER+SHIFT,Return,spawn,/usr/bin/ghostty

# 全局唯一终端会话进程：foot-float-only
binds=SUPER,s,toggle_named_scratchpad,foot-float-only,none,foot -a foot-float-only -T tmux-only -e tmux new-session -A -s tmux-only

# 应用启动器 -- fuzzel
# bind=SUPER,a,spawn,fuzzel
bind=SUPER,a,spawn,~/.config/mango/scripts/list-activity-windows.sh

# 应用启动器plus --- vicinae
bind=SUPER,space,spawn,vicinae toggle

# 剪切板历史 -- 轻量版本
# bind=SUPER,v,spawn_shell,cliphist list | fuzzel --dmenu | cliphist decode | wl-copy
# bind=SUPER,v,spawn_shell,cliphist list | fuzzel --dmenu --lines=15 | cliphist decode | wl-copy
# bind=SUPER,v,spawn,vicinae vicinae://launch/clipboard/history

# 剪切板历史 --- vicinae 加强版
# 如果该窗口已经打开，那么窗口会自动关闭
bind=SUPER,v,spawn,vicinae 'vicinae://launch/clipboard/history?toggle=true'

# 运行命令 或 脚本
bind=super,p,spawn,vicinae vicinae://launch/system/run

# 文件管理器 nautilus
bind=SUPER,e,spawn,nautilus

# 文件管理器终端 yazi
bind=super+SHIFT,e,toggle_named_scratchpad,none,ghostty-yazi,ghostty --title=ghostty-yazi -e yazi

# 截图区域 → satty
bind=none,XF86SelectiveScreenshot,spawn_shell,grim -g "$(slurp -b '#2E2A1E55' -c '#fb751bff')" -t ppm - | satty -f -
bind=none,XF86SelectiveScreenshot,spawn, /usr/bin/wayscrollshot
# 截图全屏 → grim
binds=none,Print,spawn_shell,grim
# binds=none,code:107,spawn_shell,grim

# F1 — 静音 XF86AudioMute
# F2 — 音量降低 XF86AudioLowerVolume
# F3 — 音量提高 XF86AudioRaiseVolume
# F4 — 麦克风静音切换 XF86AudioMicMute
# F5 — 亮度降低 XF86MonBrightnessDown
# F6 — 亮度提高 XF86MonBrightnessUp
# F7 — 切换显示/投影模式 XF86Display
# F8 — 唤醒屏幕 XF86WakeUp
# F9 — 全屏截图 Print
# F10 — 区域截图 XF86SelectiveScreenshot
# F11 — 链接手机 XF86LinkPhone
# F12 — 打开收藏夹 XF86Favorites
# -----------------------------------------------------------
# 3. 音频控制
# -----------------------------------------------------------
bind=none,XF86AudioRaiseVolume,spawn,~/.config/mango/scripts/volume.sh up
bind=none,XF86AudioLowerVolume,spawn,~/.config/mango/scripts/volume.sh down
bind=none,XF86AudioMute,spawn,~/.config/mango/scripts/volume.sh mute
bind=none,XF86AudioMicMute,spawn_shell,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# 无此按键
# bind=none,XF86AudioNext,spawn_shell,playerctl next
# 无此按键
# bind=none,XF86AudioPrev,spawn_shell,playerctl previous

# bind=none,XF86AudioPause,spawn_shell,playerctl play-pause
bind=SUPER+ALT,UP,spawn_shell,playerctl previous
bind=SUPER+ALT,J,spawn_shell,playerctl previous
bind=SUPER+ALT,down,spawn_shell,playerctl next
bind=SUPER+ALT,K,spawn_shell,playerctl next
bind=SUPER+ALT,space,spawn_shell,playerctl play-pause

# -----------------------------------------------------------
# 4. 亮度
# -----------------------------------------------------------
bind=none,XF86MonBrightnessUp,spawn,~/.config/mango/scripts/brightness.sh up
bind=none,XF86MonBrightnessDown,spawn,~/.config/mango/scripts/brightness.sh down

# 待设置
# bind=none,XF86Favorites,spawn_shell,playerctl play-pause

# -----------------------------------------------------------
# 5. 焦点移动
# -----------------------------------------------------------

# 聚焦上一个聚焦过的窗口
bind=SUPER,Tab,focuslast

# 聚焦左边
bind=SUPER,h,focusdir,left
bind=SUPER,Left,focusdir,left

# 聚焦右边
# 平铺布局 - 物理方向（tile/grid/dwindle 等） -- 对比与 focusstack
bind=SUPER,l,focusdir,right
bind=SUPER,Right,focusdir,right

# 聚焦前一个窗口 - 按栈方向（所有布局） -- 循环
bind=SUPER,u,focusstack,next

# 聚焦上边
bind=SUPER,k,focusdir,up
bind=SUPER,Up,focusdir,up

# 聚焦下边
bind=SUPER,j,focusdir,down
bind=SUPER,Down,focusdir,down
# -----------------------------------------------------------
# 6. 切换 Tag
# -----------------------------------------------------------
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# 3指：窗口焦点切换
gesturebind=none,left,3,focusdir,right
gesturebind=none,right,3,focusdir,left
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down

# 4指：tag（工作区）切换
gesturebind=none,left,4,viewtoright_have_client
gesturebind=none,right,4,viewtoleft_have_client
gesturebind=none,up,4,spawn,fuzzel
# 概览试图
gesturebind=none,down,4,toggleoverview

binds=SUPER+SHIFT,h,viewtoleft
binds=SUPER+SHIFT,Left,viewtoleft
binds=SUPER+SHIFT,l,viewtoright
binds=SUPER+SHIFT,Right,viewtoright

# -----------------------------------------------------------
# 7. 移动窗口/列
# -----------------------------------------------------------
# mango: exchange_client 交换窗口位置
bind=SUPER+CTRL,h,exchange_client,left
bind=SUPER+CTRL,Left,exchange_client,left
bind=SUPER+CTRL,l,exchange_client,right
bind=SUPER+CTRL,Right,exchange_client,right
bind=SUPER+CTRL,k,exchange_client,up
bind=SUPER+CTRL,Up,exchange_client,up
bind=SUPER+CTRL,j,exchange_client,down
bind=SUPER+CTRL,Down,exchange_client,down

# 发送窗口到 Tag（MOD+CTRL+1~9 移动列到工作区）
bind=SUPER+CTRL,1,tag,1,0
bind=SUPER+CTRL,2,tag,2,0
bind=SUPER+CTRL,3,tag,3,0
bind=SUPER+CTRL,4,tag,4,0
bind=SUPER+CTRL,5,tag,5,0
bind=SUPER+CTRL,6,tag,6,0
bind=SUPER+CTRL,7,tag,7,0
bind=SUPER+CTRL,8,tag,8,0
bind=SUPER+CTRL,9,tag,9,0

# 当前窗口移动到左侧相邻工作区
# binds=SUPER+CTRL+SHIFT,h,tagtoleft
# 当前窗口移动到右侧相邻工作区
# binds=SUPER+CTRL+SHIFT,l,tagtoright


# -----------------------------------------------------------
# 8. 显示器切换
# -----------------------------------------------------------
# 聚焦显示器
bind=SUPER+CTRL+SHIFT,h,focusmon,left
bind=SUPER+CTRL+SHIFT,Left,focusmon,left
bind=SUPER+CTRL+SHIFT,l,focusmon,right
bind=SUPER+CTRL+SHIFT,Right,focusmon,right

# 发送窗口到显示器（mango: tagmon）
bind=SUPER+Alt,h,tagmon,left
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,l,tagmon,right
bind=SUPER+Alt,Right,tagmon,right

# -----------------------------------------------------------
# 9. 窗口状态
# -----------------------------------------------------------
# 最大化到边缘
bind=SUPER,f,togglemaximizescreen

# 全屏
bind=SUPER+SHIFT,f,togglefullscreen

# 假全屏模式
# bind=SUPER+CTRL,f,togglefakefullscreen

# 切换浮动
bind=SUPER,t,togglefloating
# 切换所有浮动窗口
bind=SUPER+SHIFT,t,toggle_all_floating

# 概览模式
bind=SUPER,o,toggleoverview,0

# 切换列最小化（隐藏窗口） -- 隐藏窗口
bind=SUPER,i,minimized
# 从暂存区恢复
bind=SUPER+SHIFT,i,restore_minimized

# -----------------------------------------------------------
# 10. 调整大小（MOD+MINUS/EQUAL → 列宽 ±10%）
# -----------------------------------------------------------
bind=SUPER,minus,resizewin,-100,0
bind=SUPER,equal,resizewin,+100,0
bind=SUPER+SHIFT,minus,resizewin,0,-100
bind=SUPER+SHIFT,equal,resizewin,0,+100

# tile 布局
binds=SUPER,bracketleft,setmfact,-0.05
binds=SUPER,bracketright,setmfact,+0.05

# scroller 布局下 动态调整宽度
binds=SUPER,z,switch_proportion_preset,next
# scroller 布局下，默认宽度比例
# bind=SUPER,s,set_proportion,1.0

# -----------------------------------------------------------
# 11. 间隙控制
# -----------------------------------------------------------
bind=SUPER+SHIFT,z,incgaps,1
bind=SUPER+SHIFT,x,incgaps,-1
bind=SUPER+SHIFT,r,togglegaps

# -----------------------------------------------------------
# 12. 实用工具
# -----------------------------------------------------------
# 锁屏（mango 补充，避免与 SUPER+SHIFT+L 聚焦显示器冲突）
# bind=SUPER+SHIFT,period,spawn,swaylock -f -c 000000
# bind=none,XF86WakeUp,spawn,swaylock -f -c 000000
# 通过 code 绑定按键
# bind=SUPER+SHIFT,code:61,spawn, xxx

# 切换屏幕输出（wlr 窗口管理器特有）
bind=none,XF86Display,spawn,bash ~/.local/bin/wayland-monitor-layout.sh

# 创建无根显示器 - 串流用
# bind=SUPER+SHIFT,p,spawn,bash ~/.config/mango/scripts/virmon.sh

# -----------------------------------------------------------
# 13. 鼠标绑定
# -----------------------------------------------------------
# 按住 Super 拖动窗口 = 移动窗口
mousebind=SUPER,btn_left,moveresize,curmove
# 按住 Super 拖动窗口 = 调整窗口大小
mousebind=SUPER,btn_right,moveresize,curresize
# 最小化窗口到暂存区
mousebind=SUPER+CTRL,btn_left,minimized
# 从暂存区恢复窗口 
mousebind=SUPER+CTRL,btn_right,restore_minimized

# -----------------------------------------------------------
# 14. 滚轮绑定
# -----------------------------------------------------------
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client
axisbind=SUPER,LEFT,focusdir,left
axisbind=SUPER,RIGHT,focusdir,right
